<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Genesis - Contact</title>

		<!-- Standardizes default styles across different browsers -->
		<link rel="stylesheet" href="/css/normalize.css" />

		<!-- Main stylesheet -->
		<link rel="stylesheet" href="/css/main.css" />

		<!-- Mulish font family -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet" />
	</head>
	<body>
		<div class="page">
			<!-- =========================================================
					HEADER
					Site logo and main navigation
			============================================================== -->
			<header class="site-header">
				<nav class="site-nav site-nav--header">
					<ul class="site-nav__list">
						<li class="site-nav__item site-nav__item--logo">
							<a class="site-nav__link site-nav__link--logo" href="../index.html">
								<img class="site-nav__logo" src="../images/logo/brand-logo.svg" alt="Genesis Logo" />
							</a>
						</li>
						<li class="site-nav__item site-nav__item--projects">
							<a class="site-nav__link" href="projects.html">Projects</a>
						</li>
						<li class="site-nav__item site-nav__item--contact">
							<a class="site-nav__link" href="#">Contact</a>
						</li>
					</ul>
				</nav>
			</header>
			<!-- END Header -->

			<main>
				<!-- =========================================================
						CONTACT
						Contact introduction and form
				============================================================== -->
				<section class="contact">
					<h1 class="contact__title">Full set of great features to make your product fresh</h1>
					<p class="contact__intro">Our favorite brands are our friends! We help them to achieve their goals, they help us to stay sharp.</p>
					<form class="contact-form" action="#">
						<div class="contact-form__field">
							<label class="contact-form__label" for="name"></label>
							<input class="contact-form__input" id="name" type="text" name="name" required minlength="2" placeholder="Name" />
							<span class="contact-form__line"></span>
						</div>
						<div class="contact-form__field">
							<label class="contact-form__label" for="email"></label>
							<input class="contact-form__input" id="email" type="email" name="email" required="" placeholder="Email" />
							<span class="contact-form__line"></span>
						</div>
						<div class="contact-form__field">
							<label class="contact-form__label" for="message"></label>
							<input class="contact-form__input" id="message" type="text" name="message" required minlength="2" placeholder="Message" />
							<span class="contact-form__line"></span>
						</div>
						<button class="contact-form__btn" type="submit">Submit</button>
					</form>
				</section>
				<!-- END Contact -->
			</main>
		</div>
	</body>
</html>
